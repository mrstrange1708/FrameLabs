name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secrets-scan:
    name: Secret Leak Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for leaked secrets
        run: |
          echo "Scanning for common secret patterns..."
          FOUND=0

          if grep -rn 'AKIA[0-9A-Z]\{16\}' --include='*.ts' --include='*.tsx' --include='*.js' --include='*.jsx' --include='*.json' --include='*.yml' --include='*.yaml' . 2>/dev/null | grep -v node_modules | grep -v '.example'; then
            echo "::error::Possible AWS access key found!"
            FOUND=1
          fi

          if grep -rn 'BEGIN.*PRIVATE KEY' --include='*.ts' --include='*.tsx' --include='*.js' --include='*.jsx' --include='*.json' --include='*.pem' . 2>/dev/null | grep -v node_modules; then
            echo "::error::Private key found in repository!"
            FOUND=1
          fi

          if [ "$FOUND" -eq 1 ]; then
            exit 1
          fi

          echo "No leaked secrets detected."
